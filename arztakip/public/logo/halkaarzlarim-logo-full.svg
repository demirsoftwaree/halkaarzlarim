<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#10b981" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon rounded square -->
  <rect x="2" y="10" width="80" height="80" rx="20" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- TrendingUp icon -->
  <polyline points="14,70 30,50 42,60 70,28" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="56,28 70,28 70,42" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark -->
  <text y="66" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="-1">
    <tspan x="100" font-size="42" fill="#ffffff">Halka </tspan><tspan font-size="42" fill="#10b981">Arzlarım</tspan>
  </text>
</svg>
